<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudVote</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">CloudVote</a>
        <div class="nav-links">
            <a href="results.html">Results</a>
            <a href="register.html">Register</a>
        </div>
    </nav>
    <div class="container" style="max-width: 500px; margin-top: 5vh;">
        <div class="card">
            <h2 class="text-center mb-4">Voter Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-block">Sign In</button>
            </form>
            <p class="text-center mt-4">New voter? <a href="register.html" style="color: var(--primary);">Register here</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (getToken()) window.location.href = 'dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Signing in...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Login successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 500);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                    btn.innerText = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Network error', 'error');
                btn.innerText = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
