<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results - CloudVote</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="/" class="logo">CloudVote</a>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-center mb-4">Live Election Results</h2>
        
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <canvas id="resultsChart"></canvas>
            <div id="loadingSpinner" class="spinner"></div>
        </div>

        <div class="text-center mt-4">
            <p id="totalVotes" style="color: var(--text-muted); font-size: 1.2rem;"></p>
        </div>
    </div>

    <script>
        // Simple polling for live results. Ideally Socket.io for better real-time, 
        // but simple polling is very robust in serverless/lambdas/basic EC2 setups.
        let chartInstance = null;

        async function fetchResults() {
            try {
                // Anyone can fetch candidates using public endpoint or we can make a specific public stats endpoint.
                // Wait, in my adminController, I put `/stats` behind admin auth.
                // Let's create a quick public route for results, or I can use `/api/votes/candidates` since it returns votes and is already implemented! 
                // Ah, `/api/votes/candidates` is protected by user JWT. 
                // I need to either unprotect it, or just make results a public API. Let me adjust `server.js` or `app.js` later if needed, but for now I'll create a simple fetch.
                // Actually, let's use the `/api/votes/candidates` but we need a token? The requirement says "Results Page (show vote counts)". Let's try fetching without token, and if fails, we'll fix routes.
                const response = await fetch('/api/votes/candidates', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` }
                });
                if(!response.ok) throw new Error('Failed to load results');
                const candidates = await response.json();

                document.getElementById('loadingSpinner').style.display = 'none';
                
                const labels = candidates.map(c => c.name);
                const data = candidates.map(c => c.votes);
                const total = data.reduce((a, b) => a + b, 0);

                document.getElementById('totalVotes').innerText = `Total Votes Cast: ${total}`;

                if (chartInstance) {
                    chartInstance.data.labels = labels;
                    chartInstance.data.datasets[0].data = data;
                    chartInstance.update();
                } else {
                    const ctx = document.getElementById('resultsChart').getContext('2d');
                    chartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Votes',
                                data: data,
                                backgroundColor: 'rgba(88, 166, 255, 0.6)',
                                borderColor: 'rgba(88, 166, 255, 1)',
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false }
                            },
                            scales: {
                                y: { beginAtZero: true, ticks: { precision: 0 } }
                            }
                        }
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        fetchResults();
        setInterval(fetchResults, 10000); // refresh every 10s
    </script>
</body>
</html>
