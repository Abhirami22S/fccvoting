<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CloudVote</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">CloudVote</a>
        <div class="nav-links">
            <a href="results.html">Results</a>
            <a href="login.html">Login</a>
        </div>
    </nav>
    <div class="container" style="max-width: 500px; margin-top: 5vh;">
        <div class="card">
            <h2 class="text-center mb-4">Voter Registration</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="btn btn-block">Create Account</button>
            </form>
            <p class="text-center mt-4">Already registered? <a href="login.html" style="color: var(--primary);">Login here</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Registering...';
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    showToast(data.message || 'Registration failed', 'error');
                    btn.innerText = 'Create Account';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Network error', 'error');
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
