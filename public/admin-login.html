<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CloudVote</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">CloudVote Admin</a>
        <div class="nav-links">
            <a href="results.html">Results</a>
            <a href="login.html">Voter Login</a>
        </div>
    </nav>
    <div class="container" style="max-width: 500px; margin-top: 5vh;">
        <div class="card">
            <h2 class="text-center mb-4 text-danger">Administrator Access</h2>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-danger btn-block">Access Dashboard</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (localStorage.getItem('adminToken')) window.location.href = 'admin.html';

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Authenticating...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/admin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    showToast('Admin access granted', 'success');
                    setTimeout(() => window.location.href = 'admin.html', 500);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                    btn.innerText = 'Access Dashboard';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Network error', 'error');
                btn.innerText = 'Access Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
